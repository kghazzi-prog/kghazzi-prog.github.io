<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hummingbird habit · let's stay in touch</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/hht-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Regular.woff2') format('woff2'),
           url('../assets/fonts/Muller-Regular.woff') format('woff');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Bold.woff2') format('woff2'),
           url('../assets/fonts/Muller-Bold.woff') format('woff');
      font-weight: 700; font-style: normal;
    }

    :root {
      --indigo:    #2B3649;
      --green:     #2D9D78;
      --gold:      #FFC845;
      --coral:     #FF5A53;
      --ash:       #DFE0E8;
      --light-bg:  #F7F8FA;
      --f-header:  "MuseoModerno", sans-serif;
      --f-sub:     'Muller', 'Raleway', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--f-sub); color: #333; background: var(--light-bg); overflow-x: hidden; }

    /* ---- NAV ---- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      padding: 14px 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(43,54,73,0.97);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .nav-brand-text {
      font-family: var(--f-header);
      font-weight: 700; font-size: 1.05rem; color: white; letter-spacing: -0.2px;
      line-height: 1.1;
    }
    .nav-brand-text span { display: block; color: var(--coral); font-size: 0.75em; font-weight: 400; letter-spacing: 1px; }
    .nav-logo-img { height: 48px; width: auto; display: block; border-radius: 6px; }

    @media (max-width: 900px) {
      nav { padding: 14px 24px; }
    }

    /* ---- PAGE ---- */
    .page-wrap {
      min-height: 100vh;
      padding: 100px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrap {
      margin-bottom: 40px;
      text-align: center;
    }

    .logo-wrap img {
      max-width: 340px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .form-wrap {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 4px 40px rgba(43,54,73,0.09);
      border: 1px solid var(--ash);
      overflow: hidden;
      padding: 8px 0;
    }

    @media (max-width: 600px) {
      .logo-wrap img { max-width: 240px; }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-brand">
    <img src="../assets/hht-logo-dark.png" alt="Hummingbird Habit" class="nav-logo-img"/>
    <div class="nav-brand-text">
      hummingbird habit
      <span>behavioral intelligence</span>
    </div>
  </a>
</nav>

<div class="page-wrap">

  <div class="form-wrap">
    <iframe data-tally-src="https://tally.so/embed/OD01gg?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
      loading="lazy" width="100%" height="962" frameborder="0"
      marginheight="0" marginwidth="0" title="Let's stay in touch!"></iframe>
    <script>
      var d = document, w = "https://tally.so/widgets/embed.js",
      v = function() {
        "undefined" != typeof Tally
          ? Tally.loadEmbeds()
          : d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e) { e.src = e.dataset.tallySrc });
      };
      if ("undefined" != typeof Tally) v();
      else if (d.querySelector('script[src="' + w + '"]') == null) {
        var s = d.createElement("script");
        s.src = w; s.onload = v; s.onerror = v; d.body.appendChild(s);
      }
    </script>
  </div>

</div>

</body>
</html>
