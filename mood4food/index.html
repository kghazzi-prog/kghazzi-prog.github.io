<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mood4food · let's stay in touch</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/hht-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Regular.woff2') format('woff2'),
           url('../assets/fonts/Muller-Regular.woff') format('woff');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Bold.woff2') format('woff2'),
           url('../assets/fonts/Muller-Bold.woff') format('woff');
      font-weight: 700; font-style: normal;
    }

    :root {
      --indigo:    #2B3649;
      --green:     #2D9D78;
      --gold:      #FFC845;
      --coral:     #FF5A53;
      --ash:       #DFE0E8;
      --light-bg:  #F7F8FA;
      --f-header:  "MuseoModerno", sans-serif;
      --f-sub:     'Muller', 'Raleway', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--f-sub); color: #333; background: var(--light-bg); overflow-x: hidden; }

    /* ---- NAV ---- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      padding: 14px 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(43,54,73,0.97);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .nav-brand-text {
      font-family: var(--f-header);
      font-weight: 700; font-size: 1.05rem; color: white; letter-spacing: -0.2px;
      line-height: 1.1;
    }
    .nav-brand-text span { display: block; color: var(--coral); font-size: 0.75em; font-weight: 400; letter-spacing: 1px; }
    .nav-logo-img { height: 48px; width: auto; display: block; border-radius: 6px; }

    @media (max-width: 900px) {
      nav { padding: 14px 24px; }
    }

    /* ---- PAGE ---- */
    .page-wrap {
      min-height: 100vh;
      padding: 110px 24px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 22px;
      border: 1px solid var(--ash);
      box-shadow: 0 4px 40px rgba(43,54,73,0.09);
      max-width: 820px;
      width: 100%;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    /* ---- FORM SIDE ---- */
    .form-side {
      flex: 1;
      padding: 56px 52px;
    }

    .form-eyebrow {
      font-family: var(--f-sub);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--coral);
      display: block; margin-bottom: 14px;
    }

    .form-title {
      font-family: var(--f-header);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 900; text-transform: lowercase;
      color: var(--indigo); line-height: 1.1;
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-family: var(--f-sub);
      font-size: 0.82rem; font-weight: 700;
      color: var(--indigo);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      font-family: var(--f-sub);
      font-size: 0.95rem;
      color: var(--indigo);
      background: var(--light-bg);
      border: 1.5px solid var(--ash);
      border-radius: 12px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--coral);
      background: white;
    }

    textarea { min-height: 110px; }

    .btn-submit {
      margin-top: 8px;
      width: 100%;
      background: var(--coral); color: white;
      font-family: var(--f-sub); font-weight: 700; font-size: 1rem;
      padding: 15px 24px; border-radius: 50px;
      border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,90,83,0.40);
    }

    .success-msg {
      display: none;
      margin-top: 20px;
      padding: 16px 20px;
      background: rgba(45,157,120,0.1);
      border: 1.5px solid var(--green);
      border-radius: 12px;
      font-family: var(--f-sub);
      font-size: 0.95rem; color: var(--green);
      font-weight: 600; text-align: center;
    }

    /* ---- IMAGE SIDE ---- */
    .image-side {
      width: 220px;
      flex-shrink: 0;
      background: var(--light-bg);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }

    .image-side img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 700px) {
      .image-side { display: none; }
      .form-side { padding: 40px 28px; }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-brand">
    <img src="../assets/hht-logo-dark.png" alt="Hummingbird Habit" class="nav-logo-img"/>
    <div class="nav-brand-text">
      hummingbird habit
      <span>behavioral intelligence</span>
    </div>
  </a>
</nav>

<div class="page-wrap">
  <div class="card">

    <div class="form-side">
      <span class="form-eyebrow">mood4food</span>
      <h1 class="form-title">let's stay in touch</h1>

      <form id="contact-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="field">
          <label for="message">Where and how did we meet?</label>
          <textarea id="message" name="message" placeholder="Tell us a little about how we crossed paths..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Send</button>
        <div class="success-msg" id="success-msg">Thank you! We'll be in touch soon.</div>
      </form>
    </div>


  </div>
</div>

<script>
  document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) return;

    fetch('https://formspree.io/f/xpwzgkol', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        email: email,
        message: document.getElementById('message').value.trim()
      })
    }).then(function(res) {
      if (res.ok) {
        document.getElementById('contact-form').reset();
        document.getElementById('success-msg').style.display = 'block';
      }
    }).catch(function() {
      document.getElementById('success-msg').style.display = 'block';
    });
  });
</script>

</body>
</html>
