<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hummingbird habit · download our company briefs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Regular.woff2') format('woff2'),
           url('../assets/fonts/Muller-Regular.woff') format('woff');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Muller';
      src: url('../assets/fonts/Muller-Bold.woff2') format('woff2'),
           url('../assets/fonts/Muller-Bold.woff') format('woff');
      font-weight: 700; font-style: normal;
    }

    :root {
      --indigo:    #2B3649;
      --green:     #2D9D78;
      --gold:      #FFC845;
      --coral:     #FF5A53;
      --ash:       #DFE0E8;
      --light-bg:  #F7F8FA;
      --f-header:  "MuseoModerno", sans-serif;
      --f-sub:     'Muller', 'Raleway', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--f-sub); color: #333; overflow-x: hidden; }

    /* ---- NAV ---- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      padding: 14px 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(43,54,73,0.97);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .nav-brand-text {
      font-family: var(--f-header);
      font-weight: 700; font-size: 1.05rem; color: white; letter-spacing: -0.2px;
      line-height: 1.1;
    }
    .nav-brand-text span { display: block; color: var(--coral); font-size: 0.75em; font-weight: 400; letter-spacing: 1px; }
    .nav-logo-img { height: 48px; width: auto; display: block; border-radius: 6px; }

    /* ---- HERO ---- */
    .hero {
      min-height: 52vh;
      background: url('https://cdn.lugc.link/c60eb80f-594f-46f9-8a0a-6602c01f1fe4/-/stretch/off/-/resize/1500x/-/format/auto/') center center / cover no-repeat;
      display: flex; align-items: center; justify-content: center;
      padding: 130px 64px 80px;
      position: relative;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(43,54,73,0.62);
    }
    .hero-inner {
      position: relative; z-index: 1;
      text-align: center;
    }
    .hero-eyebrow {
      font-family: var(--f-sub);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--gold);
      display: block; margin-bottom: 16px;
    }
    .hero h1 {
      font-family: var(--f-header);
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 900; text-transform: lowercase;
      color: white; line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-family: var(--f-sub);
      font-size: 1.05rem; color: rgba(255,255,255,0.75);
      line-height: 1.7;
    }

    /* ---- DOWNLOAD SECTION ---- */
    .downloads {
      background: var(--light-bg);
      padding: 80px 64px;
    }
    .downloads-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }
    .downloads-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .download-card {
      background: white;
      border: 1px solid var(--ash);
      border-radius: 22px;
      padding: 32px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      text-decoration: none;
      transition: box-shadow 0.25s, transform 0.25s;
    }
    .download-card:hover {
      box-shadow: 0 8px 32px rgba(43,54,73,0.12);
      transform: translateY(-2px);
    }
    .download-card-label {
      font-family: var(--f-sub);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--coral);
      display: block; margin-bottom: 6px;
    }
    .download-card-title {
      font-family: var(--f-header);
      font-size: 1.25rem; font-weight: 900;
      text-transform: lowercase; color: var(--indigo);
    }
    .download-btn {
      flex-shrink: 0;
      background: var(--coral); color: white;
      font-family: var(--f-sub); font-weight: 700; font-size: 0.88rem;
      padding: 12px 24px; border-radius: 50px;
      white-space: nowrap;
    }

    .extra-download {
      margin-top: 12px;
      background: white;
      border: 1.5px dashed var(--ash);
      border-radius: 22px;
      padding: 24px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      text-decoration: none;
      transition: border-color 0.25s;
    }
    .extra-download:hover { border-color: var(--coral); }
    .extra-download-label {
      font-family: var(--f-sub);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: #888;
      display: block; margin-bottom: 4px;
    }
    .extra-download-title {
      font-family: var(--f-sub);
      font-size: 1rem; font-weight: 600; color: var(--indigo);
    }
    .extra-btn {
      flex-shrink: 0;
      background: transparent; color: var(--indigo);
      font-family: var(--f-sub); font-weight: 700; font-size: 0.88rem;
      padding: 12px 24px; border-radius: 50px;
      border: 2px solid var(--ash);
      white-space: nowrap;
      transition: border-color 0.25s, color 0.25s;
    }
    .extra-download:hover .extra-btn {
      border-color: var(--coral); color: var(--coral);
    }

    .downloads-visual {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .downloads-visual img {
      width: 180px;
      height: auto;
      opacity: 0.92;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 900px) {
      nav { padding: 14px 24px; }
      .hero { padding: 110px 24px 60px; }
      .downloads { padding: 60px 24px; }
      .downloads-inner { flex-direction: column; }
      .downloads-visual { display: none; }
      .download-card, .extra-download { padding: 24px 20px; flex-direction: column; align-items: flex-start; }
      .download-btn, .extra-btn { align-self: stretch; text-align: center; }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-brand">
    <img src="../assets/hht-logo-dark.png" alt="Hummingbird Habit" class="nav-logo-img"/>
    <div class="nav-brand-text">
      hummingbird habit
      <span>behavioral intelligence</span>
    </div>
  </a>
</nav>

<div class="hero">
  <div class="hero-inner">
    <span class="hero-eyebrow">company briefs</span>
    <h1>download our briefs</h1>
    <p class="hero-sub">select a brief below to download</p>
  </div>
</div>

<div class="downloads">
  <div class="downloads-inner">

    <div class="downloads-cards">

      <a href="https://s3.eu-west-1.amazonaws.com/landingi-editor-uploads/f7iWDcsi8dNveDeh/HHT_BI_website_download_compressed.pdf"
         class="download-card" target="_blank" rel="noopener noreferrer">
        <div>
          <span class="download-card-label">company brief</span>
          <div class="download-card-title">BI tech company</div>
        </div>
        <div class="download-btn">download PDF</div>
      </a>

      <a href="https://s3.eu-west-1.amazonaws.com/landingi-editor-uploads/17Qa67gHegf7bYr5/mood4food_Vision_Deck_23825V3_2.pdf"
         class="download-card" target="_blank" rel="noopener noreferrer">
        <div>
          <span class="download-card-label">spin-off brief</span>
          <div class="download-card-title">mood 4 food</div>
        </div>
        <div class="download-btn">download PDF</div>
      </a>


    </div>

    <div class="downloads-visual">
      <img src="https://cdn.lugc.link/ee3e5775-96f8-4ee2-a0a8-0cb27d25b5d9/-/mirror/-/preview/220x176/-/format/auto/"
           alt="Hummingbird Habit" />
    </div>

  </div>
</div>

</body>
</html>
